name: Pipeline

on:
  push:
    branches:
      - main
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  pull_request:
    branches:
      - main

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-go@41dfa10bad2bb2ae585af6ee5bb4d7d973ad74ed # v5.1.0
        with:
          go-version-file: 'go.mod'
          cache: false
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.9.0

  test:
    name: test-and-coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@41dfa10bad2bb2ae585af6ee5bb4d7d973ad74ed # v5.1.0
        with:
          go-version: '1.25'

      - name: generate test coverage
        run: go test ./... -coverprofile=coverage.out

      - name: check test coverage
        uses: vladopajic/go-test-coverage@f190f667e23b4441202d0bab0f8c2e7bce8925b6 # v2.18.4
        with:
          config: .testcoverage.yml
          git-token: ${{ github.token }}
          git-branch: main

  release:
    name: build-and-release
    needs: [lint, test]
    if: github.event_name == 'push' && contains(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: [ '1.25' ]

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Setup Go ${{ matrix.go-version }}
        uses: actions/setup-go@41dfa10bad2bb2ae585af6ee5bb4d7d973ad74ed # v5.1.0
        with:
          go-version: ${{ matrix.go-version }}

      - name: Socket Security (Action)
        uses: SocketDev/action@ba6de6cc0565af1f42295590380973573297e31f # v1.3.2
        with:
          mode: firewall-free

      - name: Secure Go dependencies
        run: go mod download

      - name: Display Go version
        run: go version

      - name: Test
        run: go test -v github.com/zukrin/versifyr/cmd/versifyr

      - name: Build-linux-amd64
        run: go build -v -o dist/linux-amd64/versifyr github.com/zukrin/versifyr/cmd/versifyr
      - name : Archive-linux-amd64
        run: tar -czvf dist/versifyr-linux-amd64.tar.gz dist/linux-amd64/versifyr

      - name: Build-darwin-arm64
        run: GOOS=darwin GOARCH=arm64 go build -v -o dist/darwin-arm64/versifyr github.com/zukrin/versifyr/cmd/versifyr
      - name: Archive-darwin-arm64
        run: tar -czvf dist/versifyr-darwin-arm64.tar.gz dist/darwin-arm64/versifyr

      - name: Build-darwin-amd64
        run: GOOS=darwin GOARCH=amd64 go build -v -o dist/darwin-amd64/versifyr github.com/zukrin/versifyr/cmd/versifyr
      - name: Archive-darwin-amd64
        run: tar -czvf dist/versifyr-darwin-amd64.tar.gz dist/darwin-amd64/versifyr

      - name: list files
        run: ls -laR dist

      - name: version
        run: echo "version=$(./dist/darwin-arm64/versifyr --version)" >> $GITHUB_OUTPUT
        id: version

      - name: Generate Changelog
        uses: janheinrichmerker/action-github-changelog-generator@e60b5a2bd9fcd88dadf6345ff8327863fb8b490f # v2.4
        with:
          token: ${{ github.token }}

      - name: release
        uses: softprops/action-gh-release@c062e08bd532815e2082a85e87e3ef29c3e6d191 # v2.2.0
        with:
          draft: false
          prerelease: false
          name: ${{ steps.version.outputs.version }}
          body_path: CHANGELOG.md
          files: |
            dist/versifyr-linux-amd64.tar.gz
            dist/versifyr-darwin-amd64.tar.gz
            dist/versifyr-darwin-arm64.tar.gz
        env:
          GITHUB_TOKEN: ${{ github.token }}

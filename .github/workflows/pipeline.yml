name: Pipeline

on:
  push:
    branches:
      - main
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  pull_request:
    branches:
      - main

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-go@41dfa10bad2bb2ae585af6ee5bb4d7d973ad74ed # v5.1.0
        with:
          go-version: '1.23'
          cache: false
      - name: golangci-lint
        uses: golangci/golangci-lint-action@93b9014e69c7cbab11e3b52b4fa2a439fe736af5 # v6.4.1
        with:
          version: v1.64.5

  test:
    name: test-and-coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@41dfa10bad2bb2ae585af6ee5bb4d7d973ad74ed # v5.1.0
        with:
          go-version: '1.23'

      - name: generate test coverage
        run: go test ./... -coverprofile=coverage.out

      - name: check test coverage
        uses: vladopajic/go-test-coverage@f190f667e23b4441202d0bab0f8c2e7bce8925b6 # v2.18.4
        with:
          config: .testcoverage.yml
          git-token: ${{ github.token }}
          git-branch: main

  release:
    name: build-and-release
    needs: [lint, test]
    if: github.event_name == 'push' && contains(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: [ '1.23' ]

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Socket Security (Action)
        uses: SocketDev/action@ba6de6cc0565af1f42295590380973573297e31f # v1.3.2
        with:
          mode: firewall-free

      - name: Secure Go dependencies
        run: sfw go mod download

      - name: Setup Go ${{ matrix.go-version }}
        uses: actions/setup-go@41dfa10bad2bb2ae585af6ee5bb4d7d973ad74ed # v5.1.0
        with:
          go-version: ${{ matrix.go-version }}

      - name: Display Go version
        run: go version

      - name: Test
        run: go test -v github.com/zukrin/versifyr/cmd/versifyr

      - name: Build-linux-amd64
        run: go build -v -o dist/linux-amd64/versifyr github.com/zukrin/versifyr/cmd/versifyr
      - name : Archive-linux-amd64
        run: tar -czvf dist/versifyr-linux-amd64.tar.gz dist/linux-amd64/versifyr

      - name: Build-darwin-arm64
        run: GOOS=darwin GOARCH=arm64 go build -v -o dist/darwin-arm64/versifyr github.com/zukrin/versifyr/cmd/versifyr
      - name: Archive-darwin-arm64
        run: tar -czvf dist/versifyr-darwin-arm64.tar.gz dist/darwin-arm64/versifyr

      - name: Build-darwin-amd64
        run: GOOS=darwin GOARCH=amd64 go build -v -o dist/darwin-amd64/versifyr github.com/zukrin/versifyr/cmd/versifyr
      - name: Archive-darwin-amd64
        run: tar -czvf dist/versifyr-darwin-amd64.tar.gz dist/darwin-amd64/versifyr

      - name: list files
        run: ls -laR dist

      - name: version
        run: echo "version=$(./dist/darwin-arm64/versifyr --version)" >> $GITHUB_OUTPUT
        id: version

      - name: Generate Changelog
        uses: github-changelog-generator/github-changelog-generator@38df9c420a1d6fd0a1f78d9339c790cb29ee6678 # v1.16.4
        with:
          token: ${{ github.token }}
          latestTag: ${{ github.ref_name }}

      - name: release
        uses: actions/create-release@0cb9c9b65d5d1901c1f53e5e66eaf4afd303e70e # v1.1.4
        id: create_release
        with:
          draft: false
          prerelease: false
          release_name: ${{ steps.version.outputs.version }}
          tag_name: ${{ github.ref }}
          body_path: CHANGELOG.md
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: upload linux artifact
        uses: actions/upload-release-asset@e8f9f06c4b078e705bd2ea027f0926603fc9b4d5 # v1.0.2
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./dist/versifyr-linux-amd64.tar.gz
          asset_name: versifyr-linux-amd64.tar.gz
          asset_content_type: application/gzip

      - name: upload darwin artifact
        uses: actions/upload-release-asset@e8f9f06c4b078e705bd2ea027f0926603fc9b4d5 # v1.0.2
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./dist/versifyr-darwin-amd64.tar.gz
          asset_name: versifyr-darwin-amd64.tar.gz
          asset_content_type: application/gzip

      - name: upload darwin arm artifact
        uses: actions/upload-release-asset@e8f9f06c4b078e705bd2ea027f0926603fc9b4d5 # v1.0.2
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./dist/versifyr-darwin-arm64.tar.gz
          asset_name: versifyr-darwin-arm64.tar.gz
          asset_content_type: application/gzip
